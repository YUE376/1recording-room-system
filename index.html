<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>录播室申请管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f8f9fc 0%, #eef2f9 100%);
            color: #333;
            padding: 20px;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.07);
            padding: 40px;
            overflow: hidden;
            position: relative;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: linear-gradient(90deg, #4381fb, #50c8e6, #62e0b7);
        }

        header {
            text-align: center;
            margin-bottom: 36px;
            padding-bottom: 20px;
            border-bottom: 1px solid #f0f4f8;
        }

        h1 {
            font-size: 28px;
            color: #1f2937;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .subtitle {
            color: #6b7280;
            font-size: 15px;
        }

        .main-content {
            display: flex;
            flex-wrap: wrap;
            gap: 32px;
        }

        .form-section {
            flex: 1;
            min-width: 320px;
            background: #fafbfc;
            border-radius: 14px;
            padding: 28px;
            box-shadow: 2px 10px 10px rgba(0, 0, 0, 0.04);
        }

        .records-section {
            flex: 1.2;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .record-panel {
            background: #fafbfc;
            border-radius: 14px;
            padding: 24px;
            box-shadow: 2px 10px 10px rgba0,0,0,0.04;
        }

        .section-title {
            font-size: 19px;
            color: #1f2937;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e5e7eb;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 5px;
            height: 18px;
            background: #4381fb;
            border-radius: 3px;
        }

        .expired-title::before {
            background: #9ca3af;
        }

        .form-group {
            margin-bottom: 22px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #374151;
            font-size: 14px;
        }

        input, select, textarea {
            width: 100%;
            padding: 13px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 15px;
            transition: all 0.25s ease;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #4381fb;
            box-shadow: 0 0 0 3px rgba(67, 129, 251, 0.1);
            outline: none;
        }

        textarea {
            min-height: 110px;
            resize: vertical;
        }

        .time-slots {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-top: 10px;
        }

        .time-slot {
            padding: 10px 6px;
            background: #f3f4f6;
            border: 1px solid #e5e7eb;
            border-radius: 6px;
            text-align: center;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            user-select: none;
        }

        .time-slot:hover:not(.conflict):not(.selected) {
            background: #e0e7ff;
            border-color: #c7d2fe;
        }

        .time-slot.selected {
            background: #4381fb;
            color: #fff;
            border-color: #3762d6;
        }

        .time-slot.conflict {
            background: #ef4444;
            color: #fff;
            border-color: #dc2626;
            pointer-events: none;
            opacity: 0.9;
        }

        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 28px;
            flex-wrap: wrap;
        }

        button {
            flex: 1;
            min-width: 120px;
            padding: 13px 16px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s ease;
        }

        .submit-btn {
            background: #16a34a;
            color: #fff;
        }

        .submit-btn:hover {
            background: #15803d;
        }

        .clear-btn {
            background: #6b7280;
            color: #fff;
        }

        .clear-btn:hover {
            background: #4b5563;
        }

        .records-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        .records-table th {
            text-align: left;
            padding: 12px 10px;
            color: #4b5563;
            font-weight: 500;
            border-bottom: 1px solid #e5e7eb;
        }

        .records-table td {
            padding: 11px 10px;
            border-bottom: 1px solid #f3f4f6;
        }

        .records-table tr:hover {
            background: #f9fafb;
        }

        .action-buttons {
            display: flex;
            gap: 6px;
        }

        .edit-btn {
            padding: 5px 9px;
            background: #f59e0b;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .delete-btn {
            padding: 5px 9px;
            background: #ef4444;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .empty {
            padding: 24px;
            text-align: center;
            color: #9ca3af;
            font-size: 14px;
        }

        .footer {
            margin-top: 36px;
            padding-top: 20px;
            text-align: center;
            color: #9ca3af;
            font-size: 13px;
            border-top: 1px solid #f0f4f8;
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: #fff;
            border-radius: 12px;
            padding: 30px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            text-align: center;
        }

        .modal-title {
            font-size: 18px;
            color: #1f2937;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .modal-text {
            font-size: 16px;
            color: #4b5563;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .modal-btn {
            padding: 12px 30px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            width: 100%;
            max-width: 200px;
        }

        .modal-btn:hover {
            background: #2563eb;
        }

        @media (max-width: 768px) {
            .time-slots {
                grid-template-columns: repeat(4, 1fr);
            }
            .buttons {
                flex-direction: column;
            }
        }

        @media (max-width: 480px) {
            .time-slots {
                grid-template-columns: repeat(3, 1fr);
            }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>录播室申请管理系统</h1>
        <p class="subtitle">选择日期与时段，红色为已占用，无法选择</p>
    </header>

    <div class="main-content">
        <div class="form-section">
            <h2 class="section-title">申请表单</h2>
            <form id="applicationForm">
                <div class="form-group">
                    <label>申请人姓名</label>
                    <input type="text" id="applicantName" required placeholder="请输入姓名">
                </div>
                <div class="form-group">
                    <label>所属部门</label>
                    <select id="department" required>
                        <option value="">请选择部门</option>
                        <option value="党政办公室">党政办公室</option>
                        <option value="总编室">总编室</option>
                        <option value="校对质检部">校对质检部</option>
                        <option value="财务部">财务部</option>
                        <option value="出版部">出版部</option>
                        <option value="发行部">发行部</option>
                        <option value="数媒出版事业部">数媒出版事业部</option>
                        <option value="政治理论编辑室">政治理论编辑室</option>
                        <option value="经济管理编辑室">经济管理编辑室</option>
                        <option value="社会建设编辑室">社会建设编辑室</option>
                        <option value="历史文化编辑室">历史文化编辑室</option>
                        <option value="译文编辑室">译文编辑室</option>
                        <option value="教育图书编辑室">教育图书编辑室</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>使用日期</label>
                    <input type="date" id="useDate" required>
                </div>
                <div class="form-group">
                    <label>使用时间段（24小时）</label>
                    <div class="time-slots" id="timeSlots"></div>
                </div>
                <div class="form-group">
                    <label>申请事由</label>
                    <textarea id="purpose" required placeholder="请说明用途"></textarea>
                </div>
                <div class="buttons">
                    <button type="submit" class="submit-btn">提交申请表</button>
                    <button type="button" class="clear-btn" id="clearFormBtn">清空表单</button>
                </div>
            </form>
        </div>

        <div class="records-section">
            <div class="record-panel">
                <h2 class="section-title">即将使用（按最近排序）</h2>
                <table class="records-table">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>时段</th>
                            <th>申请人</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="upcomingBody"></tbody>
                </table>
                <div id="upcomingEmpty" class="empty">暂无即将使用的申请</div>
            </div>

            <div class="record-panel">
                <h2 class="section-title expired-title">过期申请记录</h2>
                <table class="records-table">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>时段</th>
                            <th>申请人</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="expiredBody"></tbody>
                </table>
                <div id="expiredEmpty" class="empty">暂无过期记录</div>
            </div>
        </div>
    </div>

    <div class="footer">
        录播室申请管理系统 &copy; 2026 · 云端同步版
    </div>
</div>

<div class="modal" id="tipsModal">
    <div class="modal-content">
        <h3 class="modal-title">提交成功</h3>
        <p class="modal-text">请将申请表格以及修改记录提交给数媒部负责人</p>
        <button class="modal-btn" id="confirmBtn">已知晓</button>
    </div>
</div>

<script>
    // 固定文件名
    const JSON_FILE_NAME = "请将此文件发给数媒部.json";
    const TXT_FILE_NAME = "请将此文件打印并签字.txt";

    const todayStr = new Date().toISOString().split('T')[0];
    let lastOperateText = "";
    let currentUserName = "";

    // 标准时间格式
    function getNowTime() {
        return new Date().toLocaleString('zh-CN',{hour12:false});
    }

    // 读取云端记录
    async function loadRecords() {
        try{
            let res = await fetch(`./${JSON_FILE_NAME}?t=${Date.now()}`);
            if(!res.ok) return [];
            return await res.json() || [];
        }catch(e){
            return [];
        }
    }

    // 本地缓存
    function saveLocal(records){
        localStorage.setItem("cacheRecords",JSON.stringify(records));
    }

    // 导出文件
    function downFile(content,name,type){
        let blob = new Blob([content],{type:type});
        let a = document.createElement("a");
        a.href = URL.createObjectURL(blob);
        a.download = name;
        a.click();
        URL.revokeObjectURL(a.href);
    }

    // 导出双文件
    function exportTwoFile(){
        let cache = localStorage.getItem("cacheRecords") || "[]";
        // 1.导出JSON
        downFile(cache,JSON_FILE_NAME,"application/json");

        // 2.导出审批TXT（详细+简明，领导能看懂）
        let txt = `录播室申请修改记录
——————————————————
操作人：${currentUserName}
操作时间：${getNowTime()}
操作内容：${lastOperateText}

请领导审核签字。`;
        downFile(txt,TXT_FILE_NAME,"text/plain;charset=utf-8");
    }

    // 初始化时间段
    function initTime(){
        let box = document.getElementById("timeSlots");
        box.innerHTML = "";
        for(let h=0;h<24;h++){
            let d = document.createElement("div");
            d.className="time-slot";
            d.dataset.hour = h;
            let s = String(h).padStart(2,"0");
            d.innerText = `${s}:00-${s}:59`;
            d.onclick=()=>{
                if(!d.classList.contains("conflict"))d.classList.toggle("selected");
            }
            box.appendChild(d);
        }
    }

    // 刷新占用时间
    async function refreshDate(date){
        let list = await loadRecords();
        document.querySelectorAll(".time-slot").forEach(x=>{
            x.classList.remove("conflict");x.title="";
        });
        list.filter(i=>i.date===date).forEach(i=>{
            i.timeSlots.forEach(h=>{
                let dom = document.querySelector(`.time-slot[data-hour="${h}"]`);
                if(dom){dom.classList.add("conflict");dom.title=`已被${i.name}占用`;}
            });
        });
    }

    // 渲染列表
    async function renderList(){
        let all = await loadRecords();
        let soon = all.filter(x=>x.date>=todayStr);
        let old = all.filter(x=>x.date<todayStr);

        soon.sort((a,b)=>new Date(a.date)-new Date(b.date));
        old.sort((a,b)=>new Date(b.date)-new Date(a.date));

        let uDom = document.getElementById("upcomingBody");
        let oDom = document.getElementById("expiredBody");
        uDom.innerHTML="";oDom.innerHTML="";

        document.getElementById("upcomingEmpty").style.display = soon.length?"none":"block";
        document.getElementById("expiredEmpty").style.display = old.length?"none":"block";

        soon.forEach((item,idx)=>{
            let t = item.timeSlots.map(h=>String(h).padStart(2,"0")+":00").join("、");
            uDom.innerHTML += `<tr><td>${item.date}</td><td>${t}</td><td>${item.name}</td>
            <td><button class="edit-btn" data-i="${idx}">编辑</button><button class="delete-btn" data-i="${idx}">删除</button></td></tr>`;
        });

        old.forEach(item=>{
            let t = item.timeSlots.map(h=>String(h).padStart(2,"0")+":00").join("、");
            oDom.innerHTML += `<tr><td>${item.date}</td><td>${t}</td><td>${item.name}</td>
            <td><button class="delete-btn" data-id="${item.id}">删除</button></td></tr>`;
        });

        // 绑定编辑删除
        uDom.querySelectorAll(".edit-btn").forEach(b=>{
            b.onclick=async()=>{
                let i = +b.dataset.i;
                let data = soon[i];
                currentUserName = data.name;
                lastOperateText = "重新编辑原有录播室使用申请，已加载旧信息到表单";

                document.getElementById("applicantName").value=data.name;
                document.getElementById("department").value=data.department;
                document.getElementById("useDate").value=data.date;
                document.getElementById("purpose").value=data.purpose;

                await refreshDate(data.date);
                document.querySelectorAll(".time-slot.selected").forEach(x=>x.classList.remove("selected"));
                data.timeSlots.forEach(h=>{
                    let d = document.querySelector(`.time-slot[data-hour="${h}"]`);
                    if(d&&!d.classList.contains("conflict"))d.classList.add("selected");
                });

                let total = await loadRecords();
                let pos = total.findIndex(x=>x.id===data.id);
                if(pos>-1){total.splice(pos,1);saveLocal(total);}
                await renderList();
                alert("旧申请已载入表单，修改后重新提交即可");
            }
        });

        uDom.querySelectorAll(".delete-btn").forEach(b=>{
            b.onclick=async()=>{
                if(!confirm("确定删除这条申请？"))return;
                let i = +b.dataset.i;
                let data = soon[i];
                currentUserName = data.name;
                let timeTxt = data.timeSlots.map(h=>h+":00").join("、");
                lastOperateText = `删除${data.date} ${timeTxt}的录播室使用申请`;

                let total = await loadRecords();
                let newList = total.filter(x=>x.id!==data.id);
                saveLocal(newList);
                await renderList();
                await refreshDate(document.getElementById("useDate").value);
                document.getElementById("tipsModal").classList.add("active");
            }
        });

        oDom.querySelectorAll(".delete-btn").forEach(b=>{
            b.onclick=async()=>{
                if(!confirm("确定删除？"))return;
                let id = b.dataset.id;
                let total = await loadRecords();
                let data = total.find(x=>x.id===id);
                currentUserName = data.name;
                lastOperateText = `删除${data.date}过期的录播室历史申请记录`;

                let newList = total.filter(x=>x.id!==id);
                saveLocal(newList);
                await renderList();
                document.getElementById("tipsModal").classList.add("active");
            }
        });
    }

    // 提交表单
    document.getElementById("applicationForm").addEventListener("submit",async e=>{
        e.preventDefault();
        let name = document.getElementById("applicantName").value.trim();
        let dept = document.getElementById("department").value;
        let day = document.getElementById("useDate").value;
        let reason = document.getElementById("purpose").value.trim();
        let selectTime = Array.from(document.querySelectorAll(".time-slot.selected")).map(x=>+x.dataset.hour);

        if(!name||!dept||!day||!reason||selectTime.length===0){
            alert("请填全信息并选择使用时段！");
            return;
        }

        currentUserName = name;
        let timeStr = selectTime.map(h=>h+":00").join("、");
        lastOperateText = `新增申请：申请${day} ${timeStr}使用录播室，用途备注：${reason}`;

        let all = await loadRecords();
        all.push({
            id:Date.now().toString(),
            name:name,
            department:dept,
            date:day,
            timeSlots:selectTime,
            purpose:reason
        });
        saveLocal(all);

        await renderList();
        await refreshDate(day);
        e.target.reset();
        document.querySelectorAll(".time-slot.selected").forEach(x=>x.classList.remove("selected"));
        document.getElementById("tipsModal").classList.add("active");
    });

    // 弹窗已知晓
    document.getElementById("confirmBtn").addEventListener("click",()=>{
        document.getElementById("tipsModal").classList.remove("active");
        exportTwoFile();
        alert("导出完成！\n1.发给数媒部：请将此文件发给数媒部.json\n2.打印签字：请将此文件打印并签字.txt");
    });

    // 清空表单
    document.getElementById("clearFormBtn").onclick=()=>{
        document.getElementById("applicationForm").reset();
        document.querySelectorAll(".time-slot.selected").forEach(x=>x.classList.remove("selected"));
    };

    // 页面初始化
    async function init(){
        let tmr = new Date();
        tmr.setDate(tmr.getDate()+1);
        let defDay = tmr.toISOString().split("T")[0];
        document.getElementById("useDate").value = defDay;
        document.getElementById("useDate").min = todayStr;

        initTime();
        await refreshDate(defDay);
        await renderList();

        document.getElementById("useDate").addEventListener("change",async()=>{
            await refreshDate(document.getElementById("useDate").value);
            document.querySelectorAll(".time-slot.selected").forEach(x=>x.classList.remove("selected"));
        });
    }

    window.addEventListener("DOMContentLoaded",init);
</script>
</body>
</html>
