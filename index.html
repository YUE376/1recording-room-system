<!DOCTYPE html> <html lang="zh-CN"> <head> <meta charset="UTF-8"> <meta name="viewport" content="width=device-width, initial-scale=1.0"> <title>录播室申请管理系统 - 云端版</title> <style> * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Microsoft YaHei', sans-serif; }

    .clear-btn {

    }

    .sync-btn {
        background-color: #9b59b6;

    }
    
    .sync-btn:hover {

    }
    
    .records-table {
        width: 100%;

    }
    
    .records-table th, .records-table td {
        padding: 12px 15px;

    }
    
    .records-table th {

    }
    
    .records-table tr:hover {

    }
    
    .action-buttons {

    }
    
    .edit-btn, .delete-btn {
        padding: 5px 10px;

    .edit-btn {
        background-color: #f39c12;

    }
    
    .edit-btn:hover {
        background-color: #d68910;
    }
    
    .delete-btn {
        background-color: #e74c3c;
        color: white;
    }
    
    .delete-btn:hover {
        background-color: #c0392b;
    }
    
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.5);
        z-index: 1000;
        justify-content: center;
        align-items: center;
    }
    
    .modal-content {
        background-color: white;
        padding: 30px;
        border-radius: 10px;
        max-width: 500px;
        width: 90%;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
    }
    
    .modal-title {
        font-size: 20px;
        margin-bottom: 15px;

    .modal-message {

    }
    
    .modal-close {
        background-color: #3498db;

    .footer {
        margin-top: 30px;
        text-align: center;
        color: #7f8c8d;
        font-size: 14px;
        padding-top: 20px;
        border-top: 1px solid #eee;
    }
    
    .status-indicator {
        display: inline-block;
        width: 10px;
        height: 10px;
        border-radius: 50%;
        margin-right: 8px;
    }
    
    .status-online {
        background-color: #2ecc71;
    }
    
    .status-offline {
        background-color: #e74c3c;
    }
    
    .sync-status {
        margin-top: 10px;
        padding: 10px;
        background-color: #f8f9fa;
        border-radius: 5px;
        font-size: 14px;
        color: #666;
    }
    
    @media (max-width: 768px) {
        .time-slots {
            grid-template-columns: repeat(4, 1fr);
        }
        
        .buttons {
            flex-direction: column;
        }
        
        button {
            width: 100%;
        }
    }
    
    @media (max-width: 480px) {
        .time-slots {
            grid-template-columns: repeat(3, 1fr);
        }
        
        .container {
            padding: 15px;
        }
    }
</style>
</head> <body> <div class="container"> <header> <h1>录播室申请管理系统 - 云端版</h1> <p class="subtitle">基于GitHub云端存储，多浏览器实时同步</p> <div class="sync-status" id="syncStatus"> <span class="status-indicator status-online" id="statusIndicator"></span> <span id="statusText">正在连接GitHub云端仓库...</span> <span id="lastSyncTime"></span> </div> </header>
    
        <div class="main-content">

            <form id="applicationForm">

                        <option value="经济管理编辑室">经济管理编辑室</option>
                        <option value="社会建设编辑室">社会建设编辑室</option>

                <div class="buttons">

                    <button type="button" class="sync-btn" id="syncBtn">同步云端数据</button>

            </form>

        <div class="records-section">
            <h2 class="section-title">申请记录（云端存储）</h2>
            <div class="table-container">
                <table class="records-table" id="recordsTable">
                    <thead>
                        <tr>
                            <th>日期</th>

                        <!-- 申请记录将通过JavaScript动态生成 -->

            <button class="export-btn" id="copyBtn" style="margin-top: 10px;">一键复制到TXT</button>
        </div>
    </div>
    
    <div class="footer">
        <p>录播室申请管理系统 - 云端版 &copy; 2026 - 当前时间: 2026年04月04日</p>
        <p>数据存储于GitHub仓库：yue376/1recording-room-system</p>
    </div>
</div>

<!-- 冲突提示模态框 -->
<div class="modal" id="conflictModal">
    <div class="modal-content">
        <h3 class="modal-title">时间冲突提示</h3>
        <p class="modal-message" id="conflictMessage"></p>
        <button class="modal-close" id="closeModalBtn">确定</button>
    </div>
</div>

<!-- GitHub API配置 -->
<script>
    // GitHub仓库配置
    const GITHUB_CONFIG = {
        owner: 'yue376',
        repo: '1recording-room-system',
        branch: 'main',
        dataFile: 'recording-room-data.json',
        token: '' // 这里需要您添加GitHub Personal Access Token
    };
    
    // GitHub API基础URL
    const GITHUB_API_BASE = 'https://api.github.com';
    
    // 初始化时间槽位
    function initTimeSlots() {
        const timeSlotsContainer = document.getElementById('timeSlots');
        timeSlotsContainer.innerHTML = '';
        
        // 生成24个小时的时间槽位
        for (let hour = 0; hour < 24; hour++) {
            const timeSlot = document.createElement('div');
            timeSlot.className = 'time-slot';
            timeSlot.dataset.hour = hour;
            
            // 格式化时间显示
            const displayHour = hour.toString().padStart(2, '0');
            timeSlot.textContent = `${displayHour}:00-${displayHour}:59`;
            
            timeSlot.addEventListener('click', function() {
                this.classList.toggle('selected');
            });
            
            timeSlotsContainer.appendChild(timeSlot);
        }
    }
    
    // 更新同步状态显示
    function updateSyncStatus(status, message) {
        const statusIndicator = document.getElementById('statusIndicator');
        const statusText = document.getElementById('statusText');
        const lastSyncTime = document.getElementById('lastSyncTime');
        
        if (status === 'connected') {
            statusIndicator.className = 'status-indicator status-online';
            statusText.textContent = '已连接到GitHub云端仓库';
            lastSyncTime.textContent = `最后同步: ${new Date().toLocaleTimeString('zh-CN')}`;
        } else if (status === 'error') {
            statusIndicator.className = 'status-indicator status-offline';
            statusText.textContent = '云端连接失败，使用本地缓存';
            lastSyncTime.textContent = '';
        } else if (status === 'syncing') {
            statusIndicator.className = 'status-indicator status-online';
            statusText.textContent = '正在同步云端数据...';
            lastSyncTime.textContent = '';
        }
    }
    
    // 从GitHub加载申请记录
    async function loadRecordsFromGitHub() {
        try {
            updateSyncStatus('syncing');
            
            // 尝试从GitHub获取数据
            const response = await fetch(
                `${GITHUB_API_BASE}/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.dataFile}?ref=${GITHUB_CONFIG.branch}`,
                {
                    headers: GITHUB_CONFIG.token ? {
                        'Authorization': `token ${GITHUB_CONFIG.token}`,
                        'Accept': 'application/vnd.github.v3+json'
                    } : {}
                }
            );
            
            if (response.status === 404) {
                // 文件不存在，创建新文件
                console.log('GitHub数据文件不存在，将创建新文件');
                return [];
            }
            
            if (!response.ok) {
                throw new Error(`GitHub API错误: ${response.status}`);
            }
            
            const data = await response.json();
            const content = atob(data.content); // 解码base64内容
            const records = JSON.parse(content);
            
            updateSyncStatus('connected');
            return records;
        } catch (error) {
            console.error('从GitHub加载数据失败:', error);
            
            // 尝试从本地缓存加载
            const cachedRecords = localStorage.getItem('recordingRoomRecords_cache');
            if (cachedRecords) {
                updateSyncStatus('error');
                return JSON.parse(cachedRecords);
            }
            
            updateSyncStatus('error');
            return [];
        }
    }
    
    // 保存申请记录到GitHub
    async function saveRecordsToGitHub(records) {
        try {
            updateSyncStatus('syncing');
            
            // 先获取文件当前的SHA（如果存在）
            let sha = null;
            try {
                const getResponse = await fetch(
                    `${GITHUB_API_BASE}/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.dataFile}?ref=${GITHUB_CONFIG.branch}`,
                    {
                        headers: GITHUB_CONFIG.token ? {
                            'Authorization': `token ${GITHUB_CONFIG.token}`,
                            'Accept': 'application/vnd.github.v3+json'
                        } : {}
                    }
                );
                
                if (getResponse.ok) {
                    const data = await getResponse.json();
                    sha = data.sha;
                }
            } catch (error) {
                               // 文件不存在，将创建新文件
                console.log('GitHub数据文件不存在，将创建新文件');
            }
            
            // 准备要保存的数据
            const content = JSON.stringify(records, null, 2);
            const encodedContent = btoa(unescape(encodeURIComponent(content)));
            
            // 创建或更新文件
            const response = await fetch(
                `${GITHUB_API_BASE}/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.dataFile}`,
                {
                    method: 'PUT',
                    headers: GITHUB_CONFIG.token ? {
                        'Authorization': `token ${GITHUB_CONFIG.token}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    } : {
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: `更新录播室申请记录 - ${new Date().toLocaleString('zh-CN')}`,
                        content: encodedContent,
                        branch: GITHUB_CONFIG.branch,
                        sha: sha || undefined
                    })
                }
            );
            
            if (!response.ok) {
                throw new Error(`保存到GitHub失败: ${response.status}`);
            }
            
            // 同时更新本地缓存
            localStorage.setItem('recordingRoomRecords_cache', JSON.stringify(records));
            
            updateSyncStatus('connected');
            return true;
        } catch (error) {
            console.error('保存到GitHub失败:', error);
            
            // 保存到本地缓存作为备份
            localStorage.setItem('recordingRoomRecords_cache', JSON.stringify(records));
            updateSyncStatus('error');
            
            alert('云端保存失败，数据已保存到本地缓存。请检查网络连接或GitHub Token配置。');
            return false;
        }
    }
    
    // 显示申请记录
    async function displayRecords() {
        const records = await loadRecordsFromGitHub();
        const recordsBody = document.getElementById('recordsBody');
        recordsBody.innerHTML = '';
        
        if (records.length === 0) {
            recordsBody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 30px; color: #7f8c8d;">暂无申请记录</td></tr>';
            return;
        }
        
        // 按日期排序，最新的在前面
        records.sort((a, b) => new Date(b.date) - new Date(a.date));
        
        records.forEach((record, index) => {
            const row = document.createElement('tr');
            
            // 格式化时间段显示
            const timeSlots = record.timeSlots.map(hour => {
                const displayHour = hour.toString().padStart(2, '0');
                return `${displayHour}:00`;
            }).join(', ');
            
            row.innerHTML = `
                <td>${record.date}</td>
                <td>${timeSlots}</td>
                <td>${record.name}</td>
                <td>${record.department}</td>
                <td>
                    <div class="action-buttons">
                        <button class="edit-btn" data-index="${index}">编辑</button>
                        <button class="delete-btn" data-index="${index}">删除</button>
                    </div>
                </td>
            `;
            
            recordsBody.appendChild(row);
        });
        
        // 添加编辑和删除事件监听
        document.querySelectorAll('.edit-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const index = parseInt(this.dataset.index);
                editRecord(index);
            });
        });
        
        document.querySelectorAll('.delete-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                const index = parseInt(this.dataset.index);
                deleteRecord(index);
            });
        });
    }
    
    // 检查时间冲突
    async function checkTimeConflict(date, timeSlots) {
        const records = await loadRecordsFromGitHub();
        
        for (const record of records) {
            if (record.date === date) {
                // 检查是否有重叠的时间段
                const hasConflict = timeSlots.some(slot => record.timeSlots.includes(slot));
                
                if (hasConflict) {
                    return {
                        conflict: true,
                        conflictingRecord: record
                    };
                }
            }
        }
        
        return { conflict: false };
    }
    
    // 显示冲突提示
    function showConflictMessage(conflictingRecord, date, timeSlots) {
        const conflictMessage = document.getElementById('conflictMessage');
        const conflictModal = document.getElementById('conflictModal');
        
        const conflictTimes = timeSlots.filter(slot => 
            conflictingRecord.timeSlots.includes(slot)
        ).map(hour => {
            const displayHour = hour.toString().padStart(2, '0');
            return `${displayHour}:00-${displayHour}:59`;
        }).join(', ');
        
        conflictMessage.textContent = 
            `您选择的时间段与已有申请冲突！\n\n冲突时间：${date} ${conflictTimes}\n冲突申请人：${conflictingRecord.name}\n所属部门：${conflictingRecord.department}\n\n请选择其他时间段。`;
        
        conflictModal.style.display = 'flex';
        
        // 高亮显示冲突的时间段
        const allTimeSlots = document.querySelectorAll('.time-slot');
        allTimeSlots.forEach(slot => {
            const hour = parseInt(slot.dataset.hour);
            if (conflictingRecord.timeSlots.includes(hour)) {
                slot.classList.add('conflict');
            }
        });
    }
    
    // 提交申请
    async function submitApplication(event) {
        event.preventDefault();
        
        const name = document.getElementById('applicantName').value.trim();
        const department = document.getElementById('department').value;
        const date = document.getElementById('useDate').value;
        const purpose = document.getElementById('purpose').value.trim();
        
        // 获取选中的时间段
        const selectedTimeSlots = Array.from(document.querySelectorAll('.time-slot.selected'))
            .map(slot => parseInt(slot.dataset.hour));
        
        // 验证表单
        if (!name || !department || !date || !purpose || selectedTimeSlots.length === 0) {
            alert('请填写所有必填项并选择至少一个时间段！');
            return;
        }
        
        // 检查时间冲突
        const conflictCheck = await checkTimeConflict(date, selectedTimeSlots);
        if (conflictCheck.conflict) {
            showConflictMessage(conflictCheck.conflictingRecord, date, selectedTimeSlots);
            return;
        }
        
        // 创建申请记录
        const newRecord = {
            id: Date.now(),
            name,
            department,
            date,
            timeSlots: selectedTimeSlots,
            purpose,
            submitTime: new Date().toLocaleString('zh-CN')
        };
        
        // 加载现有记录，添加新记录，然后保存
        const records = await loadRecordsFromGitHub();
        records.push(newRecord);
        
        // 保存到GitHub
        const success = await saveRecordsToGitHub(records);
        
        if (success) {
            // 更新显示
            await displayRecords();
            
            // 重置表单
            document.getElementById('applicationForm').reset();
            
            // 清除所有选中的时间段
            document.querySelectorAll('.time-slot.selected').forEach(slot => {
                slot.classList.remove('selected');
            });
            
            // 清除冲突标记
            document.querySelectorAll('.time-slot.conflict').forEach(slot => {
                slot.classList.remove('conflict');
            });
            
            alert('申请提交成功！数据已同步到云端。');
        }
    }
    
    // 编辑申请记录
    async function editRecord(index) {
        const records = await loadRecordsFromGitHub();
        const record = records[index];
        
        // 填充表单
        document.getElementById('applicantName').value = record.name;
        document.getElementById('department').value = record.department;
        document.getElementById('useDate').value = record.date;
        document.getElementById('purpose').value = record.purpose;
        
        // 清除之前的选择
        document.querySelectorAll('.time-slot.selected').forEach(slot => {
            slot.classList.remove('selected');
        });
        
        // 清除冲突标记
        document.querySelectorAll('.time-slot.conflict').forEach(slot => {
            slot.classList.remove('conflict');
        });
        
        // 选择对应的时间段
        record.timeSlots.forEach(hour => {
            const slot = document.querySelector(`.time-slot[data-hour="${hour}"]`);
            if (slot) {
                slot.classList.add('selected');
            }
        });
        
        // 删除原记录
        records.splice(index, 1);
        await saveRecordsToGitHub(records);
        await displayRecords();
        
        // 滚动到表单区域
        document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth' });
        
        alert('已加载申请记录到表单，请修改后重新提交。');
    }
    
    // 删除申请记录
    async function deleteRecord(index) {
        if (confirm('确定要删除这条申请记录吗？')) {
            const records = await loadRecordsFromGitHub();
            records.splice(index, 1);
            await saveRecordsToGitHub(records);
            await displayRecords();
            alert('申请记录已删除。');
        }
    }
    
    // 导出申请记录
    async function exportRecords() {
        const records = await loadRecordsFromGitHub();
        
        if (records.length === 0) {
            alert('暂无申请记录可导出。');
            return;
        }
        
        // 创建导出内容
        let exportContent = '录播室申请记录（云端存储）\n';
        exportContent += '导出时间：' + new Date().toLocaleString('zh-CN') + '\n';
        exportContent += '数据来源：GitHub云端仓库\n';
        exportContent += '仓库地址：https://github.com/yue376/1recording-room-system\n';
        exportContent += '='.repeat(50) + '\n\n';
        
        records.forEach((record, index) => {
            exportContent += `记录 ${index + 1}:\n`;
            exportContent += `申请日期：${record.submitTime}\n`;
            exportContent += `使用日期：${record.date}\n`;
            exportContent += `使用时间段：${record.timeSlots.map(hour => {
                const displayHour = hour.toString().padStart(2, '0');
                return `${displayHour}:00-${displayHour}:59`;
            }).join(', ')}\n`;
            exportContent += `申请人：${record.name}\n`;
            exportContent += `部门：${record.department}\n`;
            exportContent += `申请事由：${record.purpose}\n`;
            exportContent += '-'.repeat(40) + '\n\n';
        });
        
        // 创建Blob对象并下载
        const blob = new Blob([exportContent], { type: 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `录播室申请记录_${new Date().toISOString().slice(0, 10)}.txt`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        alert('申请记录已导出为TXT文件。');
    }
    
    // 一键复制到剪贴板
    async function copyToClipboard() {
        const records = await loadRecordsFromGitHub();
        
        if (records.length === 0) {
            alert('暂无申请记录可复制。');
            return;
        }
        
        // 创建复制内容
        let copyContent = '录播室申请记录（云端存储）\n';
        copyContent += '复制时间：' + new Date().toLocaleString('zh-CN') + '\n';
        copyContent += '数据来源：GitHub云端仓库\n';
        copyContent += '仓库地址：https://github.com/yue376/1recording-room-system\n';
        copyContent += '='.repeat(50) + '\n\n';
        
        records.forEach((record, index) => {
            copyContent += `记录 ${index + 1}:\n`;
            copyContent += `申请日期：${record.submitTime}\n`;
            copyContent += `使用日期：${record.date}\n`;
            copyContent += `使用时间段：${record.timeSlots.map(hour => {
                const displayHour = hour.toString().padStart(2, '0');
                return `${displayHour}:00-${displayHour}:59`;
            }).join(', ')}\n`;
            copyContent += `申请人：${record.name}\n`;
            copyContent += `部门：${record.department}\n`;
            copyContent += `申请事由：${record.purpose}\n`;
            copyContent += '-'.repeat(40) + '\n\n';
        });
        
        // 使用Clipboard API复制到剪贴板
        try {
            await navigator.clipboard.writeText(copyContent);
            alert('申请记录已复制到剪贴板，可以粘贴到TXT文件中。');
        } catch (err) {
            // 如果Clipboard API不可用，使用备用方法
            const textArea = document.createElement('textarea');
            textArea.value = copyContent;
            document.body.appendChild(textArea);
            textArea.select();
            document.execCommand('copy');
            document.body.removeChild(textArea);
            alert('申请记录已复制到剪贴板，可以粘贴到TXT文件中。');
        }
    }
    
    // 清空表单
    function clearForm() {
        if (confirm('确定要清空表单内容吗？')) {
            document.getElementById('applicationForm').reset();
            document.querySelectorAll('.time-slot.selected').forEach(slot => {
                slot.classList.remove('selected');
            });
            document.querySelectorAll('.time-slot.conflict').forEach(slot => {
                slot.classList.remove('conflict');
            });
        }
    }
    
    // 手动同步数据
    async function syncData() {
        await displayRecords();
        alert('数据已从云端同步完成！');
    }
    
    // 初始化页面
    async function initPage() {
        // 设置默认日期为明天
        const tomorrow = new Date();
        tomorrow.setDate(tomorrow.getDate() + 1);
        const formattedDate = tomorrow.toISOString().split('T');
        document.getElementById('useDate').value = formattedDate;
        document.getElementById('useDate').min = formattedDate;
        
        // 初始化时间槽位
        initTimeSlots();
        
        // 显示已有记录
        await displayRecords();
        
        // 表单提交事件
        document.getElementById('applicationForm').addEventListener('submit', submitApplication);
        
        // 导出按钮事件
        document.getElementById('exportBtn').addEventListener('click', exportRecords);
        
        // 同步按钮事件
        document.getElementById('syncBtn').addEventListener('click', syncData);
        
        // 清空表单按钮事件
        document.getElementById('clearFormBtn').addEventListener('click', clearForm);
        
        // 一键复制按钮事件
        document.getElementById('copyBtn').addEventListener('click', copyToClipboard);
        
        // 关闭模态框按钮事件
        document.getElementById('closeModalBtn').addEventListener('click', function() {
            document.getElementById('conflictModal').style.display = 'none';
            // 清除冲突标记
            document.querySelectorAll('.time-slot.conflict').forEach(slot => {
                slot.classList.remove('conflict');
            });
        });
        
        // 点击模态框外部关闭
        document.getElementById('conflictModal').addEventListener('click', function(e) {
            if (e.target === this) {
                this.style.display = 'none';
                // 清除冲突标记
                document.querySelectorAll('.time-slot.conflict').forEach(slot => {
                    slot.classList.remove('conflict');
                });
            }
        });
        
        // 添加日期限制：只能选择今天及以后的日期
        const today = new Date().toISOString().split('T');
        document.getElementById('useDate').min = today;
        
        // 当日期改变时，检查时间冲突并高亮显示
        document.getElementById('useDate').addEventListener('change', async function() {
            const selectedDate = this.value;
            const records = await loadRecordsFromGitHub();
            
            // 清除所有冲突标记
            document.querySelectorAll('.time-slot.conflict').forEach(slot => {
                slot.classList.remove('conflict');
            });
            
            // 查找该日期已有的申请
            const dateRecords = records.filter(record => record.date === selectedDate);
            
            // 高亮显示已被占用的时间段
            dateRecords.forEach(record => {
                record.timeSlots.forEach(hour => {
                    const slot = document.querySelector(`.time-slot[data-hour="${hour}"]`);
                    if (slot) {
                        slot.classList.add('conflict');
                        slot.title = `已被 ${record.name} (${record.department}) 占用`;
                    }
                });
            });
        });
        
        // 自动同步数据（每30秒检查一次）
        setInterval(async () => {
            await displayRecords();
        }, 30000);
    }
    
    // 页面加载完成后初始化
    document.addEventListener('DOMContentLoaded', initPage);
</script>
</body>
</html>
