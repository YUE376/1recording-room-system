<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>录播室申请管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            padding: 30px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eaeaea;
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #7f8c8d;
            font-size: 16px;
        }
        
        .main-content {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
        }
        
        .form-section {
            flex: 1;
            min-width: 300px;
        }
        
        .records-section {
            flex: 1;
            min-width: 300px;
        }
        
        .section-title {
            font-size: 20px;
            color: #3498db;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            border-color: #3498db;
            outline: none;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .time-slots {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        
        .time-slot {
            padding: 8px 5px;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .time-slot:hover {
            background-color: #e9ecef;
        }
        
        .time-slot.selected {
            background-color: #3498db;
            color: white;
            border-color: #2980b9;
        }
        
        .time-slot.conflict {
            background-color: #e74c3c;
            color: white;
            border-color: #c0392b;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
            flex-wrap: wrap;
        }
        
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .submit-btn {
            background-color: #2ecc71;
            color: white;
        }
        
        .submit-btn:hover {
            background-color: #27ae60;
        }
        
        .export-btn {
            background-color: #3498db;
            color: white;
        }
        
        .export-btn:hover {
            background-color: #2980b9;
        }
        
        .clear-btn {
            background-color: #95a5a6;
            color: white;
        }
        
        .clear-btn:hover {
            background-color: #7f8c8d;
        }
        
        .records-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        
        .records-table th, .records-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        .records-table th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #2c3e50;
        }
        
        .records-table tr:hover {
            background-color: #f8f9fa;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        .edit-btn, .delete-btn {
            padding: 5px 10px;
            font-size: 14px;
            border-radius: 3px;
        }
        
        .edit-btn {
            background-color: #f39c12;
            color: white;
        }
        
        .edit-btn:hover {
            background-color: #d68910;
        }
        
        .delete-btn {
            background-color: #e74c3c;
            color: white;
        }
        
        .delete-btn:hover {
            background-color: #c0392b;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }
        
        .modal-title {
            font-size: 20px;
            margin-bottom: 15px;
            color: #e74c3c;
        }
        
        .modal-message {
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .modal-close {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            float: right;
        }
        
        .footer {
            margin-top: 30px;
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        @media (max-width: 768px) {
            .time-slots {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .buttons {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
        }
        
        @media (max-width: 480px) {
            .time-slots {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>录播室申请管理系统</h1>
            <p class="subtitle">请填写申请信息，选择使用日期和时间段</p>
        </header>
        
        <div class="main-content">
            <div class="form-section">
                <h2 class="section-title">申请表单</h2>
                
                <form id="applicationForm">
                    <div class="form-group">
                        <label for="applicantName">申请人姓名</label>
                        <input type="text" id="applicantName" placeholder="请输入您的姓名" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="department">选择部门</label>
                        <select id="department" required>
                            <option value="">请选择部门</option>
                            <option value="党政办公室">党政办公室</option>
                            <option value="总编室">总编室</option>
                            <option value="校对质检部">校对质检部</option>
                            <option value="财务部">财务部</option>
                            <option value="出版部">出版部</option>
                            <option value="发行部">发行部</option>
                            <option value="数媒出版事业部">数媒出版事业部</option>
                            <option value="政治理论编辑室">政治理论编辑室</option>
                            <option value="经济管理编辑室">经济管理编辑室</option>
                            <option value="社会建设编辑室">社会建设编辑室</option>
                            <option value="历史文化编辑室">历史文化编辑室</option>
                            <option value="译文编辑室">译文编辑室</option>
                            <option value="教育图书编辑室">教育图书编辑室</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="useDate">使用日期</label>
                        <input type="date" id="useDate" required>
                    </div>
                    
                    <div class="form-group">
                        <label>选择使用时间段 (24小时制)</label>
                        <div class="time-slots" id="timeSlots">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="purpose">申请事由</label>
                        <textarea id="purpose" placeholder="请详细说明申请使用录播室的事由" required></textarea>
                    </div>
                    
                    <div class="buttons">
                        <button type="submit" class="submit-btn">提交申请</button>
                        <button type="button" class="export-btn" id="exportBtn">导出申请记录</button>
                        <button type="button" class="clear-btn" id="clearFormBtn">清空表单</button>
                        <button type="button" class="export-btn" onclick="exportToGitHubFile()">同步到云端</button>
                    </div>
                </form>
            </div>
            
            <div class="records-section">
                <h2 class="section-title">申请记录</h2>
                <div class="table-container">
                    <table class="records-table" id="recordsTable">
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>时间段</th>
                                <th>申请人</th>
                                <th>部门</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="recordsBody">
                        </tbody>
                    </table>
                </div>
                <p style="margin-top: 15px; color: #7f8c8d; font-size: 14px;">点击"编辑"或"删除"按钮可修改或删除申请记录</p>
            </div>
        </div>
        
        <div class="footer">
            <p>录播室申请管理系统 &copy; 2026 - 云端共享版</p>
        </div>
    </div>
    
    <div class="modal" id="conflictModal">
        <div class="modal-content">
            <h3 class="modal-title">时间冲突提示</h3>
            <p class="modal-message" id="conflictMessage"></p>
            <button class="modal-close" id="closeModalBtn">确定</button>
        </div>
    </div>
    
    <script>
        // ====================== 纯 GitHub 安全云端存储 ======================
        const DATA_FILE = "recording-room-records.json";

        // 从 GitHub 云端加载
        async function loadRecords() {
            try {
                const res = await fetch(`./${DATA_FILE}?t=${Date.now()}`);
                if (!res.ok) return [];
                const data = await res.json();
                return Array.isArray(data) ? data : [];
            } catch (e) {
                return [];
            }
        }

        // 保存到本地缓存
        function saveRecords(records) {
            localStorage.setItem("recordingRoomRecords", JSON.stringify(records));
        }

        // 一键导出可上传到 GitHub 的 JSON 文件
        function exportToGitHubFile() {
            const records = JSON.parse(localStorage.getItem("recordingRoomRecords")) || [];
            const blob = new Blob([JSON.stringify(records, null, 2)], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = DATA_FILE;
            a.click();
            URL.revokeObjectURL(url);
            alert("导出成功！请将下载的 recording-room-records.json 上传覆盖到 GitHub 仓库根目录，所有人即可看到最新数据。");
        }

        // ====================== 原有业务逻辑完全保留 ======================
        function initTimeSlots() {
            const timeSlotsContainer = document.getElementById('timeSlots');
            timeSlotsContainer.innerHTML = '';
            for (let hour = 0; hour < 24; hour++) {
                const timeSlot = document.createElement('div');
                timeSlot.className = 'time-slot';
                timeSlot.dataset.hour = hour;
                const displayHour = hour.toString().padStart(2, '0');
                timeSlot.textContent = `${displayHour}:00-${displayHour}:59`;
                timeSlot.addEventListener('click', function() {
                    this.classList.toggle('selected');
                });
                timeSlotsContainer.appendChild(timeSlot);
            }
        }

        async function displayRecords() {
            const records = await loadRecords();
            const recordsBody = document.getElementById('recordsBody');
            recordsBody.innerHTML = '';
            
            if (records.length === 0) {
                recordsBody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 30px; color: #7f8c8d;">暂无申请记录</td></tr>';
                return;
            }
            
            records.sort((a, b) => new Date(b.date) - new Date(a.date));
            
            records.forEach((record, index) => {
                const row = document.createElement('tr');
                const timeSlots = record.timeSlots.map(hour => {
                    const displayHour = hour.toString().padStart(2, '0');
                    return `${displayHour}:00`;
                }).join(', ');
                
                row.innerHTML = `
                    <td>${record.date}</td>
                    <td>${timeSlots}</td>
                    <td>${record.name}</td>
                    <td>${record.department}</td>
                    <td>
                        <div class="action-buttons">
                            <button class="edit-btn" data-index="${index}">编辑</button>
                            <button class="delete-btn" data-index="${index}">删除</button>
                        </div>
                    </td>
                `;
                recordsBody.appendChild(row);
            });
            
            document.querySelectorAll('.edit-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    editRecord(parseInt(this.dataset.index));
                });
            });
            
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    deleteRecord(parseInt(this.dataset.index));
                });
            });
        }

        async function checkTimeConflict(date, timeSlots) {
            const records = await loadRecords();
            for (const record of records) {
                if (record.date === date) {
                    const hasConflict = timeSlots.some(slot => record.timeSlots.includes(slot));
                    if (hasConflict) {
                        return { conflict: true, conflictingRecord: record };
                    }
                }
            }
            return { conflict: false };
        }

        function showConflictMessage(conflictingRecord, date, timeSlots) {
            const conflictMessage = document.getElementById('conflictMessage');
            const conflictModal = document.getElementById('conflictModal');
            
            const conflictTimes = timeSlots.filter(slot => conflictingRecord.timeSlots.includes(slot)).map(hour => {
                const displayHour = hour.toString().padStart(2, '0');
                return `${displayHour}:00-${displayHour}:59`;
            }).join(', ');
            
            conflictMessage.textContent = `您选择的时间段与已有申请冲突！\n\n冲突时间：${date} ${conflictTimes}\n冲突申请人：${conflictingRecord.name}\n所属部门：${conflictingRecord.department}\n\n请选择其他时间段。`;
            conflictModal.style.display = 'flex';
            
            document.querySelectorAll('.time-slot').forEach(slot => {
                const hour = parseInt(slot.dataset.hour);
                if (conflictingRecord.timeSlots.includes(hour)) {
                    slot.classList.add('conflict');
                }
            });
        }

        async function submitApplication(event) {
            event.preventDefault();
            const name = document.getElementById('applicantName').value.trim();
            const department = document.getElementById('department').value;
            const date = document.getElementById('useDate').value;
            const purpose = document.getElementById('purpose').value.trim();
            const selectedTimeSlots = Array.from(document.querySelectorAll('.time-slot.selected')).map(slot => parseInt(slot.dataset.hour));
            
            if (!name || !department || !date || !purpose || selectedTimeSlots.length === 0) {
                alert('请填写所有必填项并选择至少一个时间段！');
                return;
            }
            
            const conflictCheck = await checkTimeConflict(date, selectedTimeSlots);
            if (conflictCheck.conflict) {
                showConflictMessage(conflictCheck.conflictingRecord, date, selectedTimeSlots);
                return;
            }
            
            const records = await loadRecords();
            records.push({
                id: Date.now(),
                name,
                department,
                date,
                timeSlots: selectedTimeSlots,
                purpose,
                submitTime: new Date().toLocaleString('zh-CN')
            });
            
            saveRecords(records);
            await displayRecords();
            document.getElementById('applicationForm').reset();
            document.querySelectorAll('.time-slot.selected').forEach(slot => slot.classList.remove('selected'));
            document.querySelectorAll('.time-slot.conflict').forEach(slot => slot.classList.remove('conflict'));
            alert('申请提交成功！请点击【同步到云端】发布到 GitHub 共享。');
        }

        async function editRecord(index) {
            const records = await loadRecords();
            const record = records[index];
            document.getElementById('applicantName').value = record.name;
            document.getElementById('department').value = record.department;
            document.getElementById('useDate').value = record.date;
            document.getElementById('purpose').value = record.purpose;
            
            document.querySelectorAll('.time-slot.selected').forEach(slot => slot.classList.remove('selected'));
            record.timeSlots.forEach(hour => {
                const slot = document.querySelector(`.time-slot[data-hour="${hour}"]`);
                if (slot) slot.classList.add('selected');
            });
            
            records.splice(index, 1);
            saveRecords(records);
            await displayRecords();
            document.querySelector('.form-section').scrollIntoView({ behavior: 'smooth' });
            alert('已加载到表单，请修改后重新提交。');
        }

        async function deleteRecord(index) {
            if (confirm('确定要删除这条申请记录吗？')) {
                const records = await loadRecords();
                records.splice(index, 1);
                saveRecords(records);
                await displayRecords();
                alert('记录已删除。');
            }
        }

        async function exportRecords() {
            const records = await loadRecords();
            if (records.length === 0) { alert('暂无记录'); return; }
            let exportContent = '录播室申请记录\n导出时间：' + new Date().toLocaleString('zh-CN') + '\n';
            records.forEach((r, i) => {
                exportContent += `\n记录 ${i+1}\n日期：${r.date}\n时间：${r.timeSlots.map(h=>`${h.toString().padStart(2,'0')}:00`).join(',')}\n申请人：${r.name}\n部门：${r.department}\n事由：${r.purpose}\n`;
            });
            const blob = new Blob([exportContent], { type: 'text/plain;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `录播室记录_${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            alert('导出成功！');
        }

        function clearForm() {
            if (confirm('清空表单？')) {
                document.getElementById('applicationForm').reset();
                document.querySelectorAll('.time-slot.selected').forEach(s => s.classList.remove('selected'));
                document.querySelectorAll('.time-slot.conflict').forEach(s => s.classList.remove('conflict'));
            }
        }

        async function initPage() {
            const tomorrow = new Date();
            tomorrow.setDate(tomorrow.getDate() + 1);
            const fmt = tomorrow.toISOString().split('T')[0];
            document.getElementById('useDate').value = fmt;
            document.getElementById('useDate').min = new Date().toISOString().split('T')[0];
            
            initTimeSlots();
            await displayRecords();
            
            document.getElementById('applicationForm').addEventListener('submit', submitApplication);
            document.getElementById('exportBtn').addEventListener('click', exportRecords);
            document.getElementById('clearFormBtn').addEventListener('click', clearForm);
            
            document.getElementById('closeModalBtn').addEventListener('click', () => {
                document.getElementById('conflictModal').style.display = 'none';
                document.querySelectorAll('.time-slot.conflict').forEach(s => s.classList.remove('conflict'));
            });
            
            document.getElementById('conflictModal').addEventListener('click', (e) => {
                if (e.target === this) {
                    document.getElementById('conflictModal').style.display = 'none';
                    document.querySelectorAll('.time-slot.conflict').forEach(s => s.classList.remove('conflict'));
                }
            });

            document.getElementById('useDate').addEventListener('change', async function() {
                const selectedDate = this.value;
                const records = await loadRecords();
                document.querySelectorAll('.time-slot.conflict').forEach(s => { s.classList.remove('conflict'); s.title = ''; });
                const dateRecords = records.filter(r => r.date === selectedDate);
                dateRecords.forEach(r => {
                    r.timeSlots.forEach(hour => {
                        const slot = document.querySelector(`.time-slot[data-hour="${hour}"]`);
                        if (slot) { slot.classList.add('conflict'); slot.title = `已被 ${r.name} (${r.department}) 占用`; }
                    });
                });
            });
        }

        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
