// 从GitHub加载申请记录 - 修复版本
async function loadRecordsFromGitHub() {
    try {
        updateSyncStatus('syncing');
        
        // 构建API URL
        const apiUrl = `${GITHUB_API_BASE}/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.dataFile}?ref=${GITHUB_CONFIG.branch}`;
        
        // 设置请求头
        const headers = {
            'Accept': 'application/vnd.github.v3+json',
            'Content-Type': 'application/json'
        };
        
        // 如果有token，添加到请求头
        if (GITHUB_CONFIG.token && GITHUB_CONFIG.token !== '') {
            headers['Authorization'] = `token ${GITHUB_CONFIG.token}`;
        }
        
        // 尝试从GitHub获取数据
        const response = await fetch(apiUrl, { headers });
        
        if (response.status === 404) {
            // 文件不存在，创建新文件
            console.log('GitHub数据文件不存在，将创建新文件');
            updateSyncStatus('connected', '云端文件不存在，已创建新文件');
            return [];
        }
        
        if (!response.ok) {
            const errorData = await response.json();
            throw new Error(`GitHub API错误: ${response.status} - ${errorData.message || '未知错误'}`);
        }
        
        const data = await response.json();
        
        // 修复base64解码问题
        let content;
        try {
            // 尝试直接解码
            content = atob(data.content);
        } catch (e) {
            // 如果直接解码失败，尝试使用TextDecoder进行解码
            console.log('atob解码失败，尝试使用TextDecoder:', e.message);
            try {
                const binaryString = atob(data.content.replace(/\s/g, ''));
                const bytes = new Uint8Array(binaryString.length);
                for (let i = 0; i < binaryString.length; i++) {
                    bytes[i] = binaryString.charCodeAt(i);
                }
                const decoder = new TextDecoder('utf-8');
                content = decoder.decode(bytes);
            } catch (decodeError) {
                console.error('TextDecoder解码也失败:', decodeError);
                // 如果两种方法都失败，尝试直接使用原始内容
                content = data.content;
            }
        }
        
        // 解析JSON数据
        const records = JSON.parse(content);
        updateSyncStatus('connected');
        return records;
    } catch (error) {
        console.error('从GitHub加载数据失败:', error);
        
        // 尝试从本地缓存加载
        try {
            const cachedData = localStorage.getItem('recordingRoomRecords_cache');
            if (cachedData) {
                const records = JSON.parse(cachedData);
                updateSyncStatus('error', '云端连接失败，已加载本地缓存数据');
                return records;
            }
        } catch (cacheError) {
            console.error('加载本地缓存也失败:', cacheError);
        }
        
        updateSyncStatus('error', '云端连接失败且无本地缓存');
        return [];
    }
}
