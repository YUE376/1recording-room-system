<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>录播室申请管理系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background-color: #f5f7fa;
            color: #333;
            line-height: 1.6;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.08);
            padding: 30px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #eaeaea;
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #7f8c8d;
            font-size: 16px;
        }
        
        .main-content {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
        }
        
        .form-section {
            flex: 1;
            min-width: 300px;
        }
        
        .records-section {
            flex: 1;
            min-width: 300px;
        }
        
        .section-title {
            font-size: 20px;
            color: #3498db;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        input, select, textarea {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        input:focus, select:focus, textarea:focus {
            border-color: #3498db;
            outline: none;
        }
        
        textarea {
            min-height: 100px;
            resize: vertical;
        }
        
        .time-slots {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 8px;
            margin-top: 10px;
        }
        
        .time-slot {
            padding: 8px 5px;
            background-color: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 4px;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .time-slot:hover {
            background-color: #e9ecef;
        }
        
        .time-slot.selected {
            background-color: #3498db;
            color: white;
            border-color: #2980b9;
        }
        
        .time-slot.conflict {
            background-color: #e74c3c;
            color: white;
            border-color: #c0392b;
        }
        
        .buttons {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .submit-btn {
            background-color: #2ecc71;
            color: white;
        }
        
        .submit-btn:hover {
            background-color: #27ae60;
        }
        
        .export-btn {
            background-color: #3498db;
            color: white;
        }
        
        .export-btn:hover {
            background-color: #2980b9;
        }
        
        .clear-btn {
            background-color: #95a5a6;
            color: white;
        }
        
        .clear-btn:hover {
            background-color: #7f8c8d;
        }
        
        .records-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        
        .records-table th, .records-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        
        .records-table th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: #2c3e50;
        }
        
        .records-table tr:hover {
            background-color: #f8f9fa;
        }
        
        .action-buttons {
            display: flex;
            gap: 8px;
        }
        
        .edit-btn, .delete-btn {
            padding: 5px 10px;
            font-size: 14px;
            border-radius: 3px;
        }
        
        .edit-btn {
            background-color: #f39c12;
            color: white;
        }
        
        .edit-btn:hover {
            background-color: #d68910;
        }
        
        .delete-btn {
            background-color: #e74c3c;
            color: white;
        }
        
        .delete-btn:hover {
            background-color: #c0392b;
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-content {
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            max-width: 500px;
            width: 90%;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.2);
        }
        
        .modal-title {
            font-size: 20px;
            margin-bottom: 15px;
            color: #e74c3c;
        }
        
        .modal-message {
            margin-bottom: 20px;
            line-height: 1.6;
        }
        
        .modal-close {
            background-color: #3498db;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            float: right;
        }
        
        .footer {
            margin-top: 30px;
            text-align: center;
            color: #7f8c8d;
            font-size: 14px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        
        @media (max-width: 768px) {
            .time-slots {
                grid-template-columns: repeat(4, 1fr);
            }
            
            .buttons {
                flex-direction: column;
            }
            
            button {
                width: 100%;
            }
        }
        
        @media (max-width: 480px) {
            .time-slots {
                grid-template-columns: repeat(3, 1fr);
            }
            
            .container {
                padding: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>录播室申请管理系统</h1>
            <p class="subtitle">请填写申请信息，选择使用日期和时间段</p>
        </header>
        
        <div class="main-content">
            <div class="form-section">
                <h2 class="section-title">申请表单</h2>
                
                <form id="applicationForm">
                    <div class="form-group">
                        <label for="applicantName">申请人姓名</label>
                        <input type="text" id="applicantName" placeholder="请输入您的姓名" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="department">选择部门</label>
                        <select id="department" required>
                            <option value="">请选择部门</option>
                            <option value="党政办公室">党政办公室</option>
                            <option value="总编室">总编室</option>
                            <option value="校对质检部">校对质检部</option>
                            <option value="财务部">财务部</option>
                            <option value="出版部">出版部</option>
                            <option value="发行部">发行部</option>
                            <option value="数媒出版事业部">数媒出版事业部</option>
                            <option value="政治理论编辑室">政治理论编辑室</option>
                            <option value="经济管理编辑室">经济管理编辑室</option>
                            <option value="社会建设编辑室">社会建设编辑室</option>
                            <option value="历史文化编辑室">历史文化编辑室</option>
                            <option value="译文编辑室">译文编辑室</option>
                            <option value="教育图书编辑室">教育图书编辑室</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label for="useDate">使用日期</label>
                        <input type="date" id="useDate" required>
                    </div>
                    
                    <div class="form-group">
                        <label>选择使用时间段 (24小时制)</label>
                        <div class="time-slots" id="timeSlots">
                            <!-- 时间槽位将通过JavaScript动态生成 -->
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="purpose">申请事由</label>
                        <textarea id="purpose" placeholder="请详细说明申请使用录播室的事由" required></textarea>
                    </div>
                    
                    <div class="buttons">
                        <button type="submit" class="submit-btn">提交申请</button>
                        <button type="button" class="export-btn" id="exportBtn">导出申请记录</button>
                        <button type="button" class="clear-btn" id="clearFormBtn">清空表单</button>
                    </div>
                </form>
            </div>
            
            <div class="records-section">
                <h2 class="section-title">申请记录</h2>
                <div class="table-container">
                    <table class="records-table" id="recordsTable">
                        <thead>
                            <tr>
                                <th>日期</th>
                                <th>时间段</th>
                                <th>申请人</th>
                                <th>部门</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="recordsBody">
                            <!-- 申请记录将通过JavaScript动态生成 -->
                        </tbody>
                    </table>
                </div>
                <p style="margin-top: 15px; color: #7f8c8d; font-size: 14px;">点击"编辑"或"删除"按钮可修改或删除申请记录</p>
            </div>
        </div>
        
        <div class="footer">
            <p>录播室申请管理系统 &copy; 2026 - 当前时间: 2026年04月04日</p>
        </div>
    </div>
    
    <!-- 冲突提示模态框 -->
    <div class="modal" id="conflictModal">
        <div class="modal-content">
            <h3 class="modal-title">时间冲突提示</h3>
            <p class="modal-message" id="conflictMessage"></p>
            <button class="modal-close" id="closeModalBtn">确定</button>
        </div>
    </div>
    
    <script>
        // ==================== GitHub Gist API配置 ====================
        const GITHUB_TOKEN = '你的GitHub个人访问令牌'; // 需要替换为你的GitHub Token
        const GIST_ID = '你的Gist ID'; // 需要替换为你的Gist ID
        const GIST_FILENAME = 'recording-room-data.json';
        const GIST_API_URL = 'https://api.github.com/gists';
        
        // ==================== 初始化时间槽位 ====================
        function initTimeSlots() {
            const timeSlotsContainer = document.getElementById('timeSlots');
            timeSlotsContainer.innerHTML = '';
            
            // 生成24个小时的时间槽位
            for (let hour = 0; hour < 24; hour++) {
                const timeSlot = document.createElement('div');
                timeSlot.className = 'time-slot';
                timeSlot.dataset.hour = hour;
                
                // 格式化时间显示
                const displayHour = hour.toString().padStart(2, '0');
                timeSlot.textContent = `${displayHour}:00-${displayHour}:59`;
                
                timeSlot.addEventListener('click', function() {
                    this.classList.toggle('selected');
                });
                
                timeSlotsContainer.appendChild(timeSlot);
            }
        }
        
        // ==================== 从GitHub Gist加载申请记录 ====================
        async function loadRecords() {
            try {
                const response = await fetch(`${GIST_API_URL}/${GIST_ID}`, {
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error('无法从GitHub加载数据');
                }
                
                const gistData = await response.json();
                const content = gistData.files[GIST_FILENAME].content;
                return JSON.parse(content);
            } catch (error) {
                console.error('加载记录失败:', error);
                // 如果无法从GitHub加载，尝试从本地存储加载（作为备用）
                const localRecords = JSON.parse(localStorage.getItem('recordingRoomRecords')) || [];
                return localRecords;
            }
        }
        
        // ==================== 保存申请记录到GitHub Gist ====================
        async function saveRecords(records) {
            try {
                const response = await fetch(`${GIST_API_URL}/${GIST_ID}`, {
                    method: 'PATCH',
                    headers: {
                        'Authorization': `token ${GITHUB_TOKEN}`,
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        files: {
                            [GIST_FILENAME]: {
                                content: JSON.stringify(records, null, 2)
                            }
                        }
                    })
                });
                
                if (!response.ok) {
                    throw new Error('保存到GitHub失败');
                }
                
                // 同时保存到本地存储作为缓存
                localStorage.setItem('recordingRoomRecords', JSON.stringify(records));
                
                return true;
            } catch (error) {
                console.error('保存记录失败:', error);
                // 如果GitHub保存失败，保存到本地存储
                localStorage.setItem('recordingRoomRecords', JSON.stringify(records));
                alert('网络连接失败，数据已保存到本地。请检查网络后重试。');
                return false;
            }
        }
        
        // ==================== 显示申请记录 ====================
        async function displayRecords() {
            try {
                const records = await loadRecords();
                const recordsBody = document.getElementById('recordsBody');
                recordsBody.innerHTML = '';
                
                if (records.length === 0) {
                    recordsBody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 30px; color: #7f8c8d;">暂无申请记录</td></tr>';
                    return;
                }
                
                // 按日期排序，最新的在前面
                records.sort((a, b) => new Date(b.date) - new Date(a.date));
                
                records.forEach((record, index) => {
                    const row = document.createElement('tr');
                    
                    // 格式化时间段显示
                    const timeSlots = record.timeSlots.map(hour => {
                        const displayHour = hour.toString().padStart(2, '0');
                        return `${displayHour}:00`;
                    }).join(', ');
                    
                    row.innerHTML = `
                        <td>${record.date}</td>
                        <td>${timeSlots}</td>
                        <td>${record.name}</td>
                        <td>${record.department}</td>
                        <td>
                            <div class="action-buttons">
                                <button class="edit-btn" data-index="${index}">编辑</button>
                                <button class="delete-btn" data-index="${index}">删除</button>
                            </div>
                        </td>
                    `;
                    
                    recordsBody.appendChild(row);
                });
                
                // 添加编辑和删除事件监听
                document.querySelectorAll('.edit-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const index = parseInt(this.dataset.index);
                        editRecord(index);
                    });
                });
                
                document.querySelectorAll('.delete-btn').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const index = parseInt(this.dataset.index);
                        deleteRecord(index);
                    });
                });
            } catch (error) {
                console.error('显示记录失败:', error);
                const recordsBody = document.getElementById('recordsBody');
                recordsBody.innerHTML = '<tr><td colspan="5" style="text-align: center; padding: 30px; color: #e74c3c;">加载数据失败，请检查网络连接</td></tr>';
            }
        }
        
        // ==================== 检查时间冲突 ====================
        async function checkTimeConflict(date, timeSlots) {
            const records = await loadRecords();
            
            for (const record of records) {
                if (record.date === date) {
                    // 检查是否有重叠的时间段
                    const hasConflict = timeSlots.some(slot => record.timeSlots.includes(slot));
                    
                    if (hasConflict) {
                        return {
                            conflict: true,
                            conflictingRecord: record
                        };
                    }
                }
            }
            return { conflict: false };
        }
        
        // ==================== 提交申请 ====================
        async function submitApplication(event) {
            event.preventDefault();
            
            const form = event.target;
            const name = form.applicantName.value;
            const department = form.department.value;
            const date = form.useDate.value;
            const timeSlots = Array.from(document.querySelectorAll('.time-slot.selected')).map(slot => parseInt(slot.dataset.hour));
            const purpose = form.purpose.value;
            
            // 表单验证
            if (!name || !department || !date || timeSlots.length === 0 || !purpose) {
                alert('请填写所有必填信息并选择至少一个时间段');
                return;
            }
            
            // 检查时间冲突
            const conflictResult = await checkTimeConflict(date, timeSlots);
            if (conflictResult.conflict) {
                const modalMessage = document.getElementById('conflictMessage');
                modalMessage.textContent = `所选时间段与${conflictResult.conflictingRecord.name}的申请冲突，对方申请时间为${conflictResult.conflictingRecord.timeSlots.map(hour => `${hour.toString().padStart(2, '0')}:00`).join(', ')}，请重新选择时间段。`;
                document.getElementById('conflictModal').style.display = 'block';
                return;
            }
            
            // 创建新的申请记录
            const newRecord = {
                id: Date.now(),
                name,
                department,
                date,
                timeSlots,
                purpose,
                submitTime: new Date().toLocaleString('zh-CN')
            };
            
            // 加载现有记录并添加新记录
            let records = await loadRecords();
            records.push(newRecord);
            
            // 保存记录
            const saveSuccess = await saveRecords(records);
            if (saveSuccess) {
                // 重置表单并刷新记录
                form.reset();
                document.querySelectorAll('.time-slot.selected').forEach(slot => {
                    slot.classList.remove('selected');
                });
                displayRecords();
                alert('申请提交成功！');
            }
        }
        
        // ==================== 编辑申请记录 ====================
        function editRecord(index) {
            const records = JSON.parse(localStorage.getItem('recordingRoomRecords'));
            const record = records[index];
            
            // 弹出编辑表单
            const modal = document.createElement('div');
            modal.className = 'modal';
            modal.style.display = 'block';
            modal.innerHTML = `
                <div class="modal-content">
                    <h3>编辑申请记录</h3>
                    <form id="editForm">
                        <div class="form-group">
                            <label>申请人姓名</label>
                            <input type="text" id="editName" value="${record.name}" required>
                        </div>
                        <div class="form-group">
                            <label>选择部门</label>
                            <select id="editDepartment" required>
                                <option value="">请选择部门</option>
                                <option value="党政办公室" ${record.department === '党政办公室' ? 'selected' : ''}>党政办公室</option>
                                <option value="总编室" ${record.department === '总编室' ? 'selected' : ''}>总编室</option>
                                <option value="校对质检部" ${record.department === '校对质检部' ? 'selected' : ''}>校对质检部</option>
                                <option value="财务部" ${record.department === '财务部' ? 'selected' : ''}>财务部</option>
                                <option value="出版部" ${record.department === '出版部' ? 'selected' : ''}>出版部</option>
                                <option value="发行部" ${record.department === '发行部' ? 'selected' : ''}>发行部</option>
                                <option value="数媒出版事业部" ${record.department === '数媒出版事业部' ? 'selected' : ''}>数媒出版事业部</option>
                                <option value="政治理论编辑室" ${record.department === '政治理论编辑室' ? 'selected' : ''}>政治理论编辑室</option>
                                <option value="经济管理编辑室" ${record.department === '经济管理编辑室' ? 'selected' : ''}>经济管理编辑室</option>
                                <option value="社会建设编辑室" ${record.department === '社会建设编辑室' ? 'selected' : ''}>社会建设编辑室</option>
                                <option value="历史文化编辑室" ${record.department === '历史文化编辑室' ? 'selected' : ''}>历史文化编辑室</option>
                                <option value="译文编辑室" ${record.department === '译文编辑室' ? 'selected' : ''}>译文编辑室</option>
                                <option value="教育图书编辑室" ${record.department === '教育图书编辑室' ? 'selected' : ''}>教育图书编辑室</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>使用日期</label>
                            <input type="date" id="editDate" value="${record.date}" required>
                        </div>
                        <div class="form-group">
                            <label>选择使用时间段</label>
                            <div class="time-slots" id="editTimeSlots">
                                <!-- 动态生成时间槽位 -->
                            </div>
                        </div>
                        <div class="form-group">
                            <label>申请事由</label>
                            <textarea id="editPurpose" required>${record.purpose}</textarea>
                        </div>
                        <div class="buttons">
                            <button type="submit">保存修改</button>
                            <button type="button" onclick="this.parentElement.parentElement.parentElement.style.display = 'none'">取消</button>
                        </div>
                    </form>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // 初始化编辑表单的时间槽位
            const editTimeSlotsContainer = document.getElementById('editTimeSlots');
            editTimeSlotsContainer.innerHTML = '';
            for (let hour = 0; hour < 24; hour++) {
                const timeSlot = document.createElement('div');
                timeSlot.className = 'time-slot';
                timeSlot.dataset.hour = hour;
                const displayHour = hour.toString().padStart(2, '0');
                timeSlot.textContent = `${displayHour}:00-${displayHour}:59`;
                
                // 选中已有的时间槽位
                if (record.timeSlots.includes(hour)) {
                    timeSlot.classList.add('selected');
                }
                
                timeSlot.addEventListener('click', function() {
                    this.classList.toggle('selected');
                });
                
                editTimeSlotsContainer.appendChild(timeSlot);
            }
            
            // 处理编辑表单提交
            document.getElementById('editForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const editName = document.getElementById('editName').value;
                const editDepartment = document.getElementById('editDepartment').value;
                const editDate = document.getElementById('editDate').value;
                const editTimeSlots = Array.from(document.querySelectorAll('#editTimeSlots .time-slot.selected')).map(slot => parseInt(slot.dataset.hour));
                const editPurpose = document.getElementById('editPurpose').value;
                
                // 更新记录
                records[index] = {
                    id: record.id,
                    name: editName,
                    department: editDepartment,
                    date: editDate,
                    timeSlots: editTimeSlots,
                    purpose: editPurpose,
                    submitTime: new Date().toLocaleString('zh-CN')
                };
                
                // 保存记录
                saveRecords(records);
                // 关闭模态框并刷新记录
                modal.style.display = 'none';
                displayRecords();
                alert('记录修改成功！');
            });
        }
        
        // ==================== 删除申请记录 ====================
        function deleteRecord(index) {
            if (confirm('确定要删除这条申请记录吗？')) {
                let records = JSON.parse(localStorage.getItem('recordingRoomRecords'));
                records.splice(index, 1);
                saveRecords(records);
                displayRecords();
                alert('记录删除成功！');
            }
        }
        
        // ==================== 导出申请记录 ====================
        function exportRecords() {
            const records = JSON.parse(localStorage.getItem('recordingRoomRecords'));
            if (records.length === 0) {
                alert('暂无申请记录可导出');
                return;
            }
            
            // 将记录转换为CSV格式
            const csvContent = [
                ['日期', '时间段', '申请人', '部门', '申请事由', '提交时间'],
                ...records.map(record => [
                    record.date,
                    record.timeSlots.map(hour => `${hour.toString().padStart(2, '0')}:00`).join(', '),
                    record.name,
                    record.department,
                    record.purpose,
                    record.submitTime
                ])
            ].map(row => row.join(',')).join('\n');
            
            // 创建下载链接
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', `录播室申请记录-${new Date().toLocaleDateString('zh-CN')}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }
        
        // ==================== 清空表单 ====================
        function clearForm() {
            document.getElementById('applicationForm').reset();
            document.querySelectorAll('.time-slot.selected').forEach(slot => {
                slot.classList.remove('selected');
            });
        }
        
        // ====================

        // ==================== 初始化页面 ====================
        function initPage() {
            // 初始化时间槽位
            initTimeSlots();
            // 加载并显示申请记录
            displayRecords();
            // 绑定表单提交事件
            document.getElementById('applicationForm').addEventListener('submit', submitApplication);
            // 绑定导出按钮事件
            document.getElementById('exportBtn').addEventListener('click', exportRecords);
            // 绑定清空表单按钮事件
            document.getElementById('clearFormBtn').addEventListener('click', clearForm);
            // 绑定冲突模态框关闭事件
            document.getElementById('closeModalBtn').addEventListener('click', function() {
                document.getElementById('conflictModal').style.display = 'none';
            });
        }
        
        // 页面加载时初始化
        window.addEventListener('load', initPage);
    </script>
</body>
</html>
